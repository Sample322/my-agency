<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
  }
  /* Purple gradient orbs */
  .orb1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%);
    top: -100px; left: -100px;
    filter: blur(80px);
  }
  .orb2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    filter: blur(60px);
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  h1 span {
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 26px;
    color: #9ca3af;
    letter-spacing: 0.5px;
  }
  .brand {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-size: 18px;
    color: #6b7280;
    z-index: 1;
  }
  .brand span { color: #7C3AED; }
</style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <h1><span>AI-автоматизация</span><br>для бизнеса</h1>
    <p>Боты • Автоматизация • Сайты под ключ</p>
  </div>
  <div class="brand">Простые<span>Сайты</span></div>
</body>
</html>
